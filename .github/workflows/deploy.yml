name: CI/CD — Loja IONX

on:
  push:
    branches: [main]

jobs:

  # ── CI: testa e valida ────────────────────────────────────────────────────
  ci:
    name: Testes & Build
    runs-on: ubuntu-latest

    steps:
      - name: Baixa o código
        uses: actions/checkout@v4

      - name: Instala Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instala dependências
        run: npm install

      - name: Roda os testes
        run: npm test

      - name: Faz o build
        run: npm run build

      - name: Salva o build para o deploy
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  # ── CD: publica (só roda se CI passar) ───────────────────────────────────
  deploy:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: ci

    permissions:
      contents: write

    steps:
      - name: Baixa o build gerado pelo CI
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publica no GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
